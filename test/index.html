<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weryfikacja Discord → Arkusz + klucz</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f23;
      color: #d0d0ff;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      background: #1a1a3a;
      padding: 2.5rem 3rem;
      border-radius: 12px;
      max-width: 520px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    }
    h1 { color: #7289da; margin-bottom: 1.2rem; }
    p  { color: #a0b0e0; line-height: 1.5; margin-bottom: 2rem; }
    button {
      background: #5865f2;
      color: white;
      border: none;
      padding: 14px 40px;
      font-size: 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    button:hover { background: #4752c4; }
    #status {
      margin-top: 2rem;
      font-weight: 500;
      min-height: 2.2em;
    }
    .loading { color: #ffcc00; }
    .success { color: #43b581; }
    .error   { color: #f04747; }
    .key-box {
      margin-top: 1.8rem;
      padding: 1.2rem;
      background: #0d1b2a;
      border-radius: 8px;
      word-break: break-all;
      font-family: monospace;
      font-size: 1.1rem;
      border: 1px solid #5865f2;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Weryfikacja przez Discord</h1>
  <p>Zaloguj się → dane trafią do arkusza „discord” → otrzymasz losowy klucz weryfikacyjny jako cookie i na ekranie.</p>

  <button id="loginBtn">
    <svg width="24" height="24" viewBox="0 0 127 96" fill="currentColor">
      <path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-.09 56.6.06 80.21a113.31 113.31 0 0 0 33.09 16.59 77.06 77.06 0 0 0 6.75-10.27 70.33 70.33 0 0 1-10.81-5.14c.91-.66 1.8-1.34 2.66-2.03a73.6 73.6 0 0 0 62.36 0c.87.69 1.75 1.37 2.66 2.03a70.8 70.8 0 0 1-10.82 5.15 77.5 77.5 0 0 0 6.75 10.27 113.3 113.3 0 0 0 33.08-16.59c.17-23.61-2.71-47.56-14.07-72.14zM42.45 65.69C38.49 65.69 35 62.42 35 58.4s3.49-7.29 7.45-7.29 7.45 3.27 7.45 7.29-3.49 7.29-7.45 7.29zm42.24 0c-3.96 0-7.45-3.27-7.45-7.29s3.49-7.29 7.45-7.29 7.45 3.27 7.45 7.29-3.49 7.29-7.45 7.29z"/>
    </svg>
    Zaloguj się Discordem
  </button>

  <div id="status"></div>
  <div id="keyDisplay" class="key-box" style="display:none;"></div>
</div>

<script>
// ────────────────────────────────────────────────
// Konfiguracja – zmień tylko WEB_APP_URL !
const WEB_APP_URL = "https://script.google.com/macros/s/TWÓJ_WEB_APP_ID/exec";  // ← wklej swój URL Web App !!!
// ────────────────────────────────────────────────

const CLIENT_ID    = "1478856260526018671";
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPE        = "identify";  // dodaj np. " guilds email" jeśli chcesz więcej danych

const authUrl = new URL("https://discord.com/api/oauth2/authorize");
authUrl.searchParams.set("client_id", CLIENT_ID);
authUrl.searchParams.set("redirect_uri", REDIRECT_URI);
authUrl.searchParams.set("response_type", "code");
authUrl.searchParams.set("scope", SCOPE);

// PKCE helpers
async function generatePKCE() {
  const rand = crypto.getRandomValues(new Uint8Array(32));
  const verifier = btoa(String.fromCharCode(...rand))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
  const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
  const challenge = btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
  return { verifier, challenge };
}

// Losowy klucz weryfikacyjny (32 znaki base64url)
function generateVerificationKey() {
  const bytes = crypto.getRandomValues(new Uint8Array(24));
  return btoa(String.fromCharCode(...bytes))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
}

// Logowanie
document.getElementById("loginBtn").onclick = async () => {
  const status = document.getElementById("status");
  status.textContent = "Generuję PKCE...";
  status.className = "loading";

  try {
    const { verifier, challenge } = await generatePKCE();
    sessionStorage.setItem("pkce_verifier", verifier);

    const state = crypto.randomUUID();
    sessionStorage.setItem("oauth_state", state);

    authUrl.searchParams.set("state", state);
    authUrl.searchParams.set("code_challenge", challenge);
    authUrl.searchParams.set("code_challenge_method", "S256");

    window.location.href = authUrl.toString();
  } catch (err) {
    status.textContent = "Błąd: " + err.message;
    status.className = "error";
  }
};

// Po powrocie z Discorda
window.addEventListener("load", async () => {
  const params = new URLSearchParams(location.search);
  const code  = params.get("code");
  const state = params.get("state");

  if (!code) return;

  const savedState = sessionStorage.getItem("oauth_state");
  if (state !== savedState) {
    document.getElementById("status").textContent = "Błąd: state mismatch";
    document.getElementById("status").className = "error";
    return;
  }

  const verifier = sessionStorage.getItem("pkce_verifier");
  if (!verifier) return;

  const status = document.getElementById("status");
  status.textContent = "Wymiana kodu na token...";

  try {
    // 1. Wymiana code → token (PKCE – bez client_secret!)
    const tokenBody = new URLSearchParams({
      client_id: CLIENT_ID,
      grant_type: "authorization_code",
      code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier
    });

    const tokenRes = await fetch("https://discord.com/api/oauth2/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: tokenBody
    });

    if (!tokenRes.ok) throw new Error(await tokenRes.text());

    const { access_token } = await tokenRes.json();

    // 2. Dane użytkownika
    const userRes = await fetch("https://discord.com/api/users/@me", {
      headers: { Authorization: `Bearer ${access_token}` }
    });

    if (!userRes.ok) throw new Error("Błąd /users/@me");

    const user = await userRes.json();

    const username    = user.global_name || user.username;
    const disc        = user.discriminator === "0" ? "" : "#" + user.discriminator;
    const avatarUrl   = user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128` : "";

    status.textContent = "Zapisywanie do arkusza...";

    // 3. Generujemy klucz
    const verifKey = generateVerificationKey();

    // 4. Zapisujemy wiersz przez istniejącą akcję appendRow
    const values = JSON.stringify([
      new Date().toISOString(),
      user.id,
      username,
      user.global_name || "",
      user.discriminator || "0",
      avatarUrl,
      verifKey   // klucz weryfikacyjny jako ostatnia kolumna
    ]);

    const resp = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        action: "appendRow",
        values: values,
        sheet: "discord"
      })
    });

    if (!resp.ok) throw new Error("Błąd appendRow");

    // 5. Ustawiamy cookie
    document.cookie = `disc_verif_key=${verifKey}; path=/; max-age=${7776000}; SameSite=Lax`; // ~90 dni

    status.innerHTML = `Gotowe!<br>Zarejestrowano <strong>${username}${disc}</strong>`;
    status.className = "success";

    document.getElementById("keyDisplay").innerHTML = `
      Twój klucz weryfikacyjny (cookie + ekran):<br>
      <strong>${verifKey}</strong>
    `;
    document.getElementById("keyDisplay").style.display = "block";

    // Czyszczenie URL i sesji
    sessionStorage.clear();
    history.replaceState({}, document.title, location.pathname);

  } catch (err) {
    status.textContent = "Błąd: " + (err.message || JSON.stringify(err));
    status.className = "error";
    console.error(err);
  }
});
</script>
</body>
</html>

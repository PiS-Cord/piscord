<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PiScord - Weryfikacja poprzez Discord</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f0f23; color: #d0d0ff; margin: 0; padding: 40px 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .card { background: #1a1a3a; padding: 2.5rem 3rem; border-radius: 12px; max-width: 520px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.7); }
    h1 { color: #7289da; margin-bottom: 1.2rem; }
    p { color: #a0b0e0; line-height: 1.5; margin-bottom: 2rem; }
    button { background: #5865f2; color: white; border: none; padding: 14px 40px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 12px; }
    button:hover { background: #4752c4; }
    #status { margin-top: 2rem; font-weight: 500; min-height: 2.2em; }
    .loading { color: #ffcc00; }
    .success { color: #43b581; }
    .banned { color: #ff5555; font-weight: bold; }
    .already { color: #00cc99; font-size: 1.3rem; margin: 1.5rem 0; }
    .key-box { margin-top: 1.8rem; padding: 1.2rem; background: #0d1b2a; border-radius: 8px; word-break: break-all; font-family: monospace; font-size: 1.1rem; border: 1px solid #5865f2; }
  </style>
</head>
<body>

<div class="card">
  <h1>Weryfikacja przez Discord</h1>
  <p id="introText">Zweryfikuj się by dostać się na stronę.</p>

  <button id="loginBtn">Zaloguj się Discordem</button>
  <button id="wroc">Wróć</button>

  <div id="status"></div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx5mXGxLbakXhP6GfyqIlSvkwq-Gg70Ib1Innuzk78pdrYmYGJjwd4AQsxsRRYQu0Oazg/exec";
const CLIENT_ID = "1478856260526018671";
const REDIRECT_URI = window.location.origin + window.location.pathname;
const SCOPE = "identify";
const COOKIE_NAME = "disc_verif_key";
const MIN_KEY_LEN = 20;

// Funkcja sprawdzająca cookie
function isAlreadyVerified() {
  const cookies = document.cookie.split('; ');
  const keyCookie = cookies.find(row => row.startsWith(COOKIE_NAME + '='));
  if (!keyCookie) return false;
  const key = keyCookie.split('=')[1];
  return key && key.length >= MIN_KEY_LEN;
}

// Podpięcie przycisków
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("wroc").onclick = () => {
    window.location.href = "https://pis-cord.github.io/wybory/";
  };

  document.getElementById("loginBtn").onclick = async () => {
    const status = document.getElementById("status");
    status.textContent = "Generuję PKCE...";
    status.className = "loading";

    try {
      const rand = crypto.getRandomValues(new Uint8Array(32));
      const verifier = btoa(String.fromCharCode(...rand)).replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");
      const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
      const challenge = btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=/g, "");

      sessionStorage.setItem("pkce_verifier", verifier);
      const state = crypto.randomUUID();
      sessionStorage.setItem("oauth_state", state);

      const authUrl = new URL("https://discord.com/api/oauth2/authorize");
      authUrl.searchParams.set("client_id", CLIENT_ID);
      authUrl.searchParams.set("redirect_uri", REDIRECT_URI);
      authUrl.searchParams.set("response_type", "code");
      authUrl.searchParams.set("scope", SCOPE);
      authUrl.searchParams.set("state", state);
      authUrl.searchParams.set("code_challenge", challenge);
      authUrl.searchParams.set("code_challenge_method", "S256");

      window.location.href = authUrl.toString();
    } catch (err) {
      status.textContent = "Błąd startu: " + err.message;
      status.className = "error";
    }
  };
});

// Główna logika po załadowaniu
window.addEventListener("load", async () => {
  const status = document.getElementById("status");

  if (isAlreadyVerified()) {
    document.getElementById("loginBtn").style.display = "none";
    document.getElementById("introText").innerHTML = "";
    status.innerHTML = '<div class="already">Jesteś już zweryfikowany ✓</div><small>Możesz wrócić na stronę głosowania.</small>';
    return;
  }

  const params = new URLSearchParams(location.search);
  const code = params.get("code");
  if (!code) {
    status.textContent = "Kliknij przycisk powyżej, aby się zweryfikować.";
    return;
  }

  const state = params.get("state");
  if (state !== sessionStorage.getItem("oauth_state")) {
    status.textContent = "Błąd bezpieczeństwa (state mismatch)";
    status.className = "error";
    return;
  }

  const verifier = sessionStorage.getItem("pkce_verifier");
  if (!verifier) {
    status.textContent = "Brak verifiera – spróbuj ponownie";
    status.className = "error";
    return;
  }

  status.textContent = "Wymiana kodu na token...";

  try {
    // Token
    const tokenRes = await fetch("https://discord.com/api/oauth2/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        client_id: CLIENT_ID,
        grant_type: "authorization_code",
        code,
        redirect_uri: REDIRECT_URI,
        code_verifier: verifier
      })
    });
    if (!tokenRes.ok) throw new Error(await tokenRes.text());
    const { access_token } = await tokenRes.json();

    // Dane użytkownika
    const userRes = await fetch("https://discord.com/api/users/@me", { headers: { Authorization: `Bearer ${access_token}` } });
    if (!userRes.ok) throw new Error("Błąd /users/@me");
    const user = await userRes.json();

    const username = user.global_name || user.username;
    const disc = user.discriminator === "0" ? "" : "#" + user.discriminator;
    const avatarUrl = user.avatar ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=128` : "";
    const verifKey = crypto.randomUUID().replace(/-/g, "");

    // Sprawdzenie bana
    const banCheckRes = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({ action: "getAll", sheet: "discord" })
    });
    const banData = JSON.parse(await banCheckRes.text()).data || [];
    if (banData.some(row => Array.isArray(row) && row[1] === user.id && row[7] === "BAN")) {
      await fetch(WEB_APP_URL, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({
          action: "appendRow",
          values: JSON.stringify([new Date().toISOString(), user.id, username, "PRÓBA_LOGOWANIA_PO_BANIE"]),
          sheet: "bany_log"
        })
      });
      status.innerHTML = '<span class="banned">Jesteś zbanowany!</span><br>Próba logowania odnotowana.';
      status.className = "error";
      return;
    }

    // Zapis do arkusza
    await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        action: "appendRow",
        values: JSON.stringify([new Date().toISOString(), user.id, username, user.global_name || "", user.discriminator || "0", avatarUrl, verifKey]),
        sheet: "discord"
      })
    });

    // Cookie
    // ustawiamy cookie + session flag
    document.cookie = `${COOKIE_NAME}=${encodeURIComponent(verifKey)}; path=/; max-age=${7776000}; SameSite=Lax`;
    sessionStorage.setItem("discVerified", "1");
    
    // redirect
    let returnUrl = new URLSearchParams(location.search).get("return");
    if (returnUrl && returnUrl.startsWith(window.location.origin)) {
        window.location.replace(returnUrl);
    } else {
        window.location.href = "https://pis-cord.github.io/wybory/";
    }
    status.innerHTML = `Gotowe!<br>Zweryfikowano <strong>${username}${disc}</strong>`;

    // Redirect
    const returnUrl = new URLSearchParams(location.search).get("return");
    setTimeout(() => {
      if (returnUrl && returnUrl.startsWith(window.location.origin)) {
        const separator = returnUrl.includes("?") ? "&" : "?";
        window.location.replace(decodeURIComponent(returnUrl + separator + "verified=1&discordId=" + encodeURIComponent(user.id)));
      } else {
        window.location.href = "https://pis-cord.github.io/wybory/?verified=1&discordId=" + encodeURIComponent(user.id);
      }
    }, 50);

  } catch (err) {
    console.error("Błąd weryfikacji:", err);
    status.innerHTML = "Błąd weryfikacji, spróbuj ponownie.";
  } finally {
    sessionStorage.clear();
    history.replaceState({}, document.title, location.pathname);
  }
});
</script>
</body>
</html>
